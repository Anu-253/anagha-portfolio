<svg width="800" height="420" viewBox="0 0 800 420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111113"/>
      <stop offset="100%" stop-color="#18181B"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="420" fill="url(#bg)"/>
  <!-- dot grid -->
  <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
    <circle cx="1" cy="1" r="1" fill="#F59E0B" opacity="0.12"/>
  </pattern>
  <rect width="800" height="420" fill="url(#dots)"/>
  <!-- accent orb -->
  <circle cx="650" cy="80" r="150" fill="#F59E0B" opacity="0.06"/>
  <!-- border -->
  <rect x="1" y="1" width="798" height="418" fill="none" stroke="#F59E0B" stroke-width="1" opacity="0.2"/>
  <!-- label -->
  <text x="32" y="52" font-family="monospace" font-size="11" fill="#F59E0B" opacity="0.7" letter-spacing="3">PREVIEW</text>
  <!-- title -->
  <text x="32" y="110" font-family="'Bebas Neue', monospace" font-size="48" fill="#FAFAFA" letter-spacing="2">AI FITNESS ASSISTANT</text>
  <!-- subtitle -->
  <text x="32" y="145" font-family="monospace" font-size="14" fill="#52525B">Real-time CV form coach · React + FastAPI + MediaPipe</text>
  <!-- placeholder note -->
  <rect x="32" y="220" width="340" height="1" fill="#F59E0B" opacity="0.2"/>
  <text x="32" y="255" font-family="monospace" font-size="12" fill="#3F3F46">Add a real screenshot to /public/projects/</text>
  <text x="32" y="275" font-family="monospace" font-size="12" fill="#3F3F46">to replace this placeholder.</text>
  <!-- accent line -->
  <rect x="0" y="415" width="800" height="4" fill="#F59E0B" opacity="0.5"/>
</svg>